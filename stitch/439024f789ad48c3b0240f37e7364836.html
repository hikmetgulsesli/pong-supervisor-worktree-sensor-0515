<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Game Over - Pong Arcade</title>

                      "surface-container-highest": "#2d3449",
                      "inverse-primary": "#5c5f61",
                      "surface-container": "#171f33",
                      "on-tertiary-fixed": "#002109",
                      "on-secondary-fixed-variant": "#3a485c",
                      "on-primary-fixed": "#191c1e",
                      "on-primary": "#2d3133",
                      "primary-fixed-dim": "#c4c7c9",
                      "primary": "#ffffff",
                      "surface-dim": "#0b1326",
                      "background": "#0b1326",
                      "on-secondary-fixed": "#0d1c2f",
                      "secondary-container": "#3c4a5e",
                      "on-surface": "#dae2fd",
                      "surface-variant": "#2d3449",
                      "outline": "#8e9193",
                      "surface-container-high": "#222a3d",
                      "error-container": "#93000a",
                      "inverse-on-surface": "#283044",
                      "surface-bright": "#31394d",
                      "on-tertiary-container": "#007432",
                      "on-secondary": "#233144",
                      "primary-container": "#e0e3e5",
                      "surface-container-low": "#131b2e",
                      "error": "#ffb4ab",
                      "secondary-fixed": "#d5e3fd",
                      "on-surface-variant": "#c4c7c9",

              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "gutter": "16px",
                      "margin-lg": "48px",
                      "margin-sm": "24px",
                      "court-padding": "8px",
                      "touch-target": "44px"
              },
              "fontFamily": {
                      "display-score": [
                              "Hanken Grotesk"
                      ],
                      "headline-lg-mobile": [
                              "Hanken Grotesk"
                      ],

<style>
        .glow-focus:focus {
            border-color: #F8FAFC !important;
            box-shadow: 0 0 4px #F8FAFC !important;
            outline: none;
        }
    </style>
</head>
<body class="bg-background dark:bg-background text-on-surface h-screen w-screen overflow-hidden flex flex-col relative">
<!-- TopNavBar (Hidden on Mobile, Visible on Web if needed, but Game Over usually hides global nav for focus. Keeping it as per "Semantic Shell" mandate rules for top-level if it was, but this is a transactional/modal screen. SUPPRESSING NAVBARS as per instruction: "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Linear/Transactional... or Success/Confirmation splash screens.") -->
<!-- Background Game Court Context (Blurred) -->
<div class="absolute inset-0 z-0 flex items-center justify-center p-gutter pointer-events-none opacity-40 blur-md">
<div class="w-full max-w-5xl aspect-video border border-surface-variant flex items-center justify-between p-court-padding relative">
<!-- Center Line -->
<div class="absolute inset-y-0 left-1/2 -ml-[1px] w-[2px] bg-surface-variant border-dashed border-y-[20px] border-background"></div>
<!-- Paddles -->
<div class="h-1/3 w-4 bg-primary"></div>
<div class="h-1/3 w-4 bg-primary"></div>
<!-- Ball -->
<div class="absolute top-1/2 left-3/4 w-4 h-4 bg-primary rounded-full"></div>
</div>
</div>
<!-- Main Game Over Modal Canvas -->
<main class="relative z-10 flex-1 flex items-center justify-center p-gutter">
<!-- Game Over Card -->
<div class="bg-surface/80 backdrop-blur-xl border border-outline-variant w-full max-w-lg rounded-xl flex flex-col items-center p-margin-sm shadow-2xl relative overflow-hidden">
<!-- Glow Accent -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-1 bg-tertiary-container blur-sm opacity-50"></div>
<!-- Header -->
<div class="text-center mb-margin-sm w-full">
<span class="font-label-caps text-label-caps text-tertiary-container uppercase block mb-2 tracking-widest">Victory</span>
<h1 class="font-display-score text-display-score text-primary tracking-tighter drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">YOU WIN</h1>
</div>
<!-- Stats Grid -->
<div class="w-full grid grid-cols-2 gap-4 mb-margin-lg border-y border-outline-variant py-margin-sm">
<!-- Final Score -->
<div class="flex flex-col items-center justify-center border-r border-outline-variant">
<span class="font-label-caps text-label-caps text-surface-tint uppercase mb-1">Final Score</span>
<div class="flex items-baseline gap-2">
<span class="font-headline-lg text-headline-lg text-primary">11</span>
<span class="font-body-md text-body-md text-surface-tint">-</span>
<span class="font-headline-lg text-headline-lg text-surface-tint">8</span>
</div>
</div>
<!-- Match Duration -->
<div class="flex flex-col items-center justify-center">
<span class="font-label-caps text-label-caps text-surface-tint uppercase mb-1">Duration</span>
<span class="font-headline-lg text-headline-lg text-primary">03:42</span>
</div>
</div>
<!-- High Score Highlight (Conditional) -->
<div class="bg-surface-variant/50 border border-tertiary-container/30 px-4 py-2 rounded-full flex items-center gap-2 mb-margin-lg">
<span class="material-symbols-outlined text-tertiary-container" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
<span class="font-button-text text-button-text text-tertiary-container uppercase tracking-wider">New High Score!</span>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-3">
<button class="h-touch-target w-full bg-outline-variant text-primary hover:bg-primary hover:text-background active:scale-95 transition-all duration-200 font-button-text text-button-text uppercase rounded flex items-center justify-center gap-2 glow-focus">
<span class="material-symbols-outlined">replay</span>
                    Play Again
                </button>
<div class="grid grid-cols-2 gap-3 w-full">
<button class="h-touch-target bg-surface text-primary border border-outline-variant hover:bg-primary hover:text-background active:scale-95 transition-all duration-200 font-button-text text-button-text uppercase rounded flex items-center justify-center gap-2 glow-focus">
<span class="material-symbols-outlined">share</span>
                        Share Score
                    </button>
<button class="h-touch-target bg-surface text-primary border border-outline-variant hover:bg-primary hover:text-background active:scale-95 transition-all duration-200 font-button-text text-button-text uppercase rounded flex items-center justify-center gap-2 glow-focus">
<span class="material-symbols-outlined">leaderboard</span>
                        Leaderboard
                    </button>
</div>
<button class="h-touch-target w-full mt-2 bg-transparent text-surface-tint hover:text-primary transition-colors duration-200 font-button-text text-button-text uppercase rounded flex items-center justify-center gap-2 glow-focus">
<span class="material-symbols-outlined">home</span>
                    Main Menu
                </button>
</div>
</div>
</main>
</body></html>

<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pong Arcade - Game Options</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#444749",
                    "surface-tint": "#c4c7c9",
                    "on-tertiary": "#003915",
                    "primary-fixed": "#e0e3e5",
                    "inverse-surface": "#dae2fd",
                    "surface-container-lowest": "#060e20",
                    "tertiary": "#ffffff",
                    "on-primary-container": "#626567",
                    "tertiary-fixed-dim": "#4ae176",
                    "on-error-container": "#ffdad6",
                    "tertiary-container": "#6bff8f",
                    "on-background": "#dae2fd",
                    "secondary": "#b9c7e0",
                    "secondary-fixed-dim": "#b9c7e0",
                    "on-secondary-container": "#abb9d2",
                    "on-error": "#690005",
                    "on-tertiary-fixed-variant": "#005321",
                    "tertiary-fixed": "#6bff8f",
                    "surface-container-highest": "#2d3449",
                    "inverse-primary": "#5c5f61",
                    "surface-container": "#171f33",
                    "on-tertiary-fixed": "#002109",
                    "on-secondary-fixed-variant": "#3a485c",
                    "on-primary-fixed": "#191c1e",
                    "on-primary": "#2d3133",
                    "primary-fixed-dim": "#c4c7c9",
                    "primary": "#ffffff",
                    "surface-dim": "#0b1326",
                    "background": "#0b1326",
                    "on-secondary-fixed": "#0d1c2f",
                    "secondary-container": "#3c4a5e",
                    "on-surface": "#dae2fd",
                    "surface-variant": "#2d3449",
                    "outline": "#8e9193",
                    "surface-container-high": "#222a3d",
                    "error-container": "#93000a",
                    "inverse-on-surface": "#283044",
                    "surface-bright": "#31394d",
                    "on-tertiary-container": "#007432",
                    "on-secondary": "#233144",
                    "primary-container": "#e0e3e5",
                    "surface-container-low": "#131b2e",
                    "error": "#ffb4ab",
                    "secondary-fixed": "#d5e3fd",
                    "on-surface-variant": "#c4c7c9",
                    "surface": "#0b1326",
                    "on-primary-fixed-variant": "#444749"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "16px",
                    "margin-lg": "48px",
                    "margin-sm": "24px",
                    "court-padding": "8px",
                    "touch-target": "44px"
            },
            "fontFamily": {
                    "display-score": ["Hanken Grotesk"],
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "body-md": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "headline-lg": ["Hanken Grotesk"],
                    "button-text": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "display-score": ["96px", { "lineHeight": "100px", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                    "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                    "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                    "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "button-text": ["14px", { "lineHeight": "20px", "fontWeight": "600" }]
            }
          }
        }
      }
    </script>
<style>
        /* Minimal custom CSS for range slider to fit high-contrast glow aesthetic */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 8px;
            background: #ffffff;
            border-radius: 0;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #444749;
            border-radius: 0;
        }
        input[type=range]:focus::-webkit-slider-thumb {
            box-shadow: 0 0 8px #ffffff;
        }
    </style>
</head>
<body class="bg-background text-primary min-h-screen flex flex-col font-body-md">
<!-- TopNavBar -->
<nav class="bg-background dark:bg-background border-b border-outline-variant flex justify-between items-center w-full px-margin-sm md:px-margin-lg h-touch-target full-width top-0 z-50">
<div class="font-display-score text-headline-lg-mobile md:text-headline-lg text-primary uppercase tracking-tighter">PONG ARCADE</div>
<div class="flex gap-4">
<button class="h-touch-target w-touch-target flex items-center justify-center text-primary font-bold border-b-2 border-primary pb-1 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
</button>
<button class="h-touch-target w-touch-target flex items-center justify-center text-on-surface-variant font-medium hover:bg-surface-variant transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</nav>
<!-- Main Canvas -->
<main class="flex-1 flex items-center justify-center p-gutter md:p-margin-lg">
<!-- Settings Panel Card -->
<div class="w-full max-w-md bg-surface-container border border-outline-variant rounded p-margin-sm md:p-margin-lg relative overflow-hidden backdrop-blur-md">
<h1 class="font-label-caps text-label-caps text-primary uppercase mb-8 pb-4 border-b border-outline-variant">Game Options</h1>
<form class="space-y-6">
<!-- Sound Effects Slider -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-body-md text-body-md text-primary" for="sfx-vol">Sound Effects</label>
<span class="font-label-caps text-label-caps text-on-surface-variant">80%</span>
</div>
<div class="h-touch-target flex items-center w-full">
<input class="w-full appearance-none bg-transparent focus:outline-none" id="sfx-vol" max="100" min="0" type="range" value="80"/>
</div>
</div>
<!-- Music Slider -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-body-md text-body-md text-primary" for="music-vol">Music</label>
<span class="font-label-caps text-label-caps text-on-surface-variant">45%</span>
</div>
<div class="h-touch-target flex items-center w-full">
<input class="w-full appearance-none bg-transparent focus:outline-none" id="music-vol" max="100" min="0" type="range" value="45"/>
</div>
</div>
<!-- Difficulty Select -->
<div class="space-y-2">
<label class="font-body-md text-body-md text-primary block" for="difficulty">Difficulty</label>
<div class="relative w-full">
<select class="w-full h-touch-target bg-background border border-outline-variant text-primary font-body-md text-body-md px-4 appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" id="difficulty">
<option value="easy">Easy</option>
<option selected="" value="medium">Medium</option>
<option value="hard">Hard</option>
<option value="insane">Insane</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Ball Speed Select -->
<div class="space-y-2">
<label class="font-body-md text-body-md text-primary block" for="ball-speed">Ball Speed</label>
<div class="relative w-full">
<select class="w-full h-touch-target bg-background border border-outline-variant text-primary font-body-md text-body-md px-4 appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" id="ball-speed">
<option value="1x">1x (Standard)</option>
<option selected="" value="1.5x">1.5x (Fast)</option>
<option value="2x">2x (Hyper)</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Theme Selection -->
<div class="space-y-2 pt-2">
<label class="font-body-md text-body-md text-primary block">Theme</label>
<div class="flex flex-col sm:flex-row gap-2">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="theme" type="radio" value="arcade"/>
<div class="h-touch-target flex items-center justify-center font-button-text text-button-text bg-surface-variant text-primary border border-outline-variant peer-checked:bg-primary peer-checked:text-background peer-focus:ring-2 peer-focus:ring-primary/50">
                                Arcade
                            </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="theme" type="radio" value="classic"/>
<div class="h-touch-target flex items-center justify-center font-button-text text-button-text bg-surface-variant text-primary border border-outline-variant peer-checked:bg-primary peer-checked:text-background peer-focus:ring-2 peer-focus:ring-primary/50">
                                Classic
                            </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="theme" type="radio" value="neon"/>
<div class="h-touch-target flex items-center justify-center font-button-text text-button-text bg-surface-variant text-primary border border-outline-variant peer-checked:bg-primary peer-checked:text-background peer-focus:ring-2 peer-focus:ring-primary/50">
                                Neon
                            </div>
</label>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col sm:flex-row gap-4 pt-8 border-t border-outline-variant mt-8">
<button class="h-touch-target px-6 flex items-center justify-center font-button-text text-button-text border border-outline-variant text-primary hover:bg-surface-variant focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" type="button">
                        Reset to Default
                    </button>
<button class="flex-1 h-touch-target px-6 flex items-center justify-center font-button-text text-button-text bg-surface-variant text-primary hover:bg-primary hover:text-background focus:outline-none focus:ring-2 focus:ring-primary/50" type="button">
                        Save &amp; Close
                    </button>
</div>
</form>
</div>
</main>
</body></html>

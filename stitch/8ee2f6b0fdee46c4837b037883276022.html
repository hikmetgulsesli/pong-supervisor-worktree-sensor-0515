<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PONG ARCADE - Game Board</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#444749",
                    "surface-tint": "#c4c7c9",
                    "on-tertiary": "#003915",
                    "primary-fixed": "#e0e3e5",
                    "inverse-surface": "#dae2fd",
                    "surface-container-lowest": "#060e20",
                    "tertiary": "#ffffff",
                    "on-primary-container": "#626567",
                    "tertiary-fixed-dim": "#4ae176",
                    "on-error-container": "#ffdad6",
                    "tertiary-container": "#6bff8f",
                    "on-background": "#dae2fd",
                    "secondary": "#b9c7e0",
                    "secondary-fixed-dim": "#b9c7e0",
                    "on-secondary-container": "#abb9d2",
                    "on-error": "#690005",
                    "on-tertiary-fixed-variant": "#005321",
                    "tertiary-fixed": "#6bff8f",
                    "surface-container-highest": "#2d3449",
                    "inverse-primary": "#5c5f61",
                    "surface-container": "#171f33",
                    "on-tertiary-fixed": "#002109",
                    "on-secondary-fixed-variant": "#3a485c",
                    "on-primary-fixed": "#191c1e",
                    "on-primary": "#2d3133",
                    "primary-fixed-dim": "#c4c7c9",
                    "primary": "#ffffff",
                    "surface-dim": "#0b1326",
                    "background": "#0b1326",
                    "on-secondary-fixed": "#0d1c2f",
                    "secondary-container": "#3c4a5e",
                    "on-surface": "#dae2fd",
                    "surface-variant": "#2d3449",
                    "outline": "#8e9193",
                    "surface-container-high": "#222a3d",
                    "error-container": "#93000a",
                    "inverse-on-surface": "#283044",
                    "surface-bright": "#31394d",
                    "on-tertiary-container": "#007432",
                    "on-secondary": "#233144",
                    "primary-container": "#e0e3e5",
                    "surface-container-low": "#131b2e",
                    "error": "#ffb4ab",
                    "secondary-fixed": "#d5e3fd",
                    "on-surface-variant": "#c4c7c9",
                    "surface": "#0b1326",
                    "on-primary-fixed-variant": "#444749"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "16px",
                    "margin-lg": "48px",
                    "margin-sm": "24px",
                    "court-padding": "8px",
                    "touch-target": "44px"
            },
            "fontFamily": {
                    "display-score": [
                            "Hanken Grotesk"
                    ],
                    "headline-lg-mobile": [
                            "Hanken Grotesk"
                    ],
                    "body-md": [
                            "Hanken Grotesk"
                    ],
                    "label-caps": [
                            "Hanken Grotesk"
                    ],
                    "headline-lg": [
                            "Hanken Grotesk"
                    ],
                    "button-text": [
                            "Hanken Grotesk"
                    ]
            },
            "fontSize": {
                    "display-score": [
                            "96px",
                            {
                                    "lineHeight": "100px",
                                    "letterSpacing": "-0.04em",
                                    "fontWeight": "800"
                            }
                    ],
                    "headline-lg-mobile": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "400"
                            }
                    ],
                    "label-caps": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "letterSpacing": "0.1em",
                                    "fontWeight": "700"
                            }
                    ],
                    "headline-lg": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"

                    ],
                    "button-text": [
                            "14px",
                            {
                                    "lineHeight": "20px",
                                    "fontWeight": "600"
                            }
                    ]
            }
    },
        },
      }
    </script>
<style>
        .glow-focus:focus-within {
            box-shadow: 0 0 0 4px rgba(248, 250, 252, 0.2);
            border-color: #ffffff;
        }
        .glow-ball {
            box-shadow: 0 0 12px 2px rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="bg-background text-primary h-screen w-screen overflow-hidden flex flex-col font-body-md select-none">
<!-- TopNavBar -->
<header class="flex justify-between items-center w-full px-margin-sm md:px-margin-lg h-touch-target bg-background border-b border-outline-variant docked full-width top-0 z-10 shrink-0">
<div class="flex items-center">
<h1 class="font-display-score text-headline-lg-mobile md:text-headline-lg text-primary uppercase tracking-tighter">PONG ARCADE</h1>
</div>
<div class="flex items-center gap-4">
<button aria-label="Pause Game" class="w-touch-target h-touch-target flex items-center justify-center text-primary bg-surface-variant rounded hover:bg-primary hover:text-background transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button aria-label="Settings" class="w-touch-target h-touch-target flex items-center justify-center text-primary bg-surface-variant rounded hover:bg-primary hover:text-background transition-colors duration-200 active:scale-95">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Game Area -->
<main class="flex-grow flex flex-col items-center justify-center p-gutter relative w-full h-full overflow-hidden">
<!-- Game Container (16:9 Aspect Ratio Focus) -->
<div class="relative w-full max-w-[1200px] aspect-[16/9] md:aspect-[21/9] lg:aspect-[16/9] bg-surface border border-outline-variant flex flex-col items-center justify-center shrink-0">
<!-- HUD / Scoreboard (Absolute within Court) -->
<div class="absolute top-8 left-0 w-full flex justify-center items-center gap-16 z-10 pointer-events-none">
<div class="flex flex-col items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-2">PLAYER 1</span>
<span class="font-display-score text-display-score text-primary">04</span>
</div>
<div class="w-px h-16 bg-outline-variant"></div>
<div class="flex flex-col items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-2">AI CPU</span>
<span class="font-display-score text-display-score text-primary">02</span>
</div>
</div>
<!-- Court Line -->
<div class="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 border-l-2 border-dashed border-outline-variant h-full w-px opacity-50 z-0"></div>
<!-- Game Elements Layer -->
<div class="absolute inset-court-padding z-10">
<!-- Left Paddle -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-4 h-32 bg-primary rounded-sm shadow-[0_0_8px_rgba(255,255,255,0.2)]"></div>
<!-- Right Paddle (AI) -->
<div class="absolute right-0 top-1/3 -translate-y-1/2 w-4 h-32 bg-primary rounded-sm"></div>
<!-- Ball -->
<div class="absolute left-1/3 top-1/2 w-4 h-4 bg-primary rounded-full glow-ball"></div>
</div>
<!-- Side Panels (Status overlay within court bounds for tight framing) -->
<div class="absolute bottom-4 left-4 flex flex-col gap-2 z-10 pointer-events-none">
<div class="bg-surface-variant/80 backdrop-blur-sm border border-outline-variant px-3 py-1 rounded">
<span class="font-label-caps text-label-caps text-primary">LEVEL 1</span>
</div>
</div>
<div class="absolute bottom-4 right-4 flex flex-col gap-2 z-10 pointer-events-none">
<div class="bg-surface-variant/80 backdrop-blur-sm border border-outline-variant px-3 py-1 rounded">
<span class="font-label-caps text-label-caps text-primary">SPEED: NORMAL</span>
</div>
</div>
</div>
<!-- Mobile Touch Controls (Visible only on small screens) -->
<div class="md:hidden w-full max-w-[1200px] mt-4 flex justify-between px-gutter shrink-0 h-32">
<div class="flex flex-col justify-between h-full w-24">
<button class="flex-1 bg-surface border border-outline-variant rounded mb-2 active:bg-primary active:text-background flex items-center justify-center text-primary transition-colors">
<span class="material-symbols-outlined">arrow_drop_up</span>
</button>
<button class="flex-1 bg-surface border border-outline-variant rounded mt-2 active:bg-primary active:text-background flex items-center justify-center text-primary transition-colors">
<span class="material-symbols-outlined">arrow_drop_down</span>
</button>
</div>
<div class="flex items-center justify-center text-on-surface-variant font-label-caps text-label-caps opacity-50">
                SWIPE TO MOVE
            </div>
</div>
</main>
<!-- BottomNavBar (Suppressed as per rules: Game Board is a focused journey, BottomNav hidden) -->
</body></html>

            </div>
<div class="flex items-center space-x-gutter">

</button>
<button aria-label="Help" class="h-touch-target w-touch-target flex items-center justify-center text-primary hover:bg-surface-variant transition-colors duration-200 active:scale-95">

<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center relative p-gutter">
<!-- Game Court Background Illusion -->
<div class="absolute inset-margin-sm md:inset-margin-lg border border-surface-variant rounded flex items-center justify-center pointer-events-none opacity-30">
<div class="w-[2px] h-full bg-surface-variant border-dashed border-l-2 border-background"></div>
</div>
<!-- Menu Container -->
<div class="z-10 bg-surface/80 backdrop-blur-md border border-outline-variant rounded-lg p-margin-sm md:p-margin-lg w-full max-w-[480px] flex flex-col items-center shadow-lg">
<h1 class="font-display-score text-display-score text-primary uppercase tracking-tighter text-center mb-margin-lg text-[48px] md:text-[64px] leading-none">
                PONG ARCADE
            </h1>
<div class="w-full space-y-4 flex flex-col">
<!-- Primary Action -->
<button class="h-touch-target w-full bg-outline-variant text-primary font-button-text text-button-text rounded flex items-center justify-center hover:bg-primary hover:text-background transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background group">
<span class="material-symbols-outlined mr-2 group-hover:text-background">sports_esports</span>
                    Start New Game
                </button>
<!-- Disabled Action -->
<button class="h-touch-target w-full bg-surface-container text-on-surface-variant font-button-text text-button-text rounded flex items-center justify-center cursor-not-allowed opacity-50 border border-outline-variant/30" disabled="">
<span class="material-symbols-outlined mr-2">play_circle</span>
                    Resume
                </button>
<!-- Settings Segmented Control -->
<div class="w-full mt-margin-sm">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-2 text-center">Difficulty</div>
<div class="flex rounded border border-outline-variant overflow-hidden h-touch-target">
<button class="flex-1 bg-surface-container text-on-surface-variant font-button-text text-button-text hover:bg-surface-variant transition-colors border-r border-outline-variant">Easy</button>
<button class="flex-1 bg-primary text-background font-button-text text-button-text font-bold border-r border-outline-variant">Medium</button>
<button class="flex-1 bg-surface-container text-on-surface-variant font-button-text text-button-text hover:bg-surface-variant transition-colors">Hard</button>
</div>
</div>

<button class="h-touch-target w-full flex items-center justify-between px-4 text-on-surface hover:bg-surface-variant hover:text-primary rounded transition-colors group">
<div class="flex items-center font-button-text text-button-text">
<span class="material-symbols-outlined mr-3 text-outline-variant group-hover:text-primary transition-colors">leaderboard</span>

<span class="material-symbols-outlined mr-3 text-outline-variant group-hover:text-primary transition-colors">menu_book</span>

</button>

<!-- Bottom Nav Mobile Shell (Contextual suppression applied - this is a transactional/focused screen, but keeping bottom nav if user wants to switch context immediately, though prompt suggests full screen menu. Given instructions "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Linear/Transactional", a main menu is arguably the start of a linear journey, but also the root destination. I will suppress the bottom nav to keep focus on the main menu card as requested by the prompt "centered, minimalist menu against the game background".) -->
